# .golangci.yml
version: "2"
run:
  timeout: 5m
  tests: true

linters:
  default: all
  disable:
    - exhaustruct
    - wsl
    - depguard
    - forbidigo
    - wsl_v5
    - varnamelen
    - err113
    - revive
  settings:
    gocognit:
      min-complexity: 20
    gocyclo:
      min-complexity: 15
    nestif:
      min-complexity: 7
    gocritic:
      settings:
        ifElseChain:
          minThreshold: 4
    mnd:
      ignored-numbers:
        - "2"
